name: MSW Inspector
description: Find gaps in your MSW mock coverage.
author: Felmon Fekadu
inputs:
  summary-file:
    description: Path to the JSON report produced by msw-inspector.
    required: true
  baseline-file:
    description: Optional previous JSON report used to show coverage delta.
    required: false
  github-token:
    description: GitHub token used for sticky PR comments.
    required: false
    default: ${{ github.token }}
  comment:
    description: Whether to create or update a sticky PR comment.
    required: false
    default: 'false'
  annotate:
    description: Whether to add GitHub annotations for unmocked, stale, and unsupported findings.
    required: false
    default: 'false'
  comment-title:
    description: Title used at the top of the sticky PR comment.
    required: false
    default: MSW mock coverage
  comment-limit:
    description: Maximum number of stale/unmocked items to include in the sticky PR comment.
    required: false
    default: '8'
outputs:
  coverage-pct:
    description: Coverage percentage from the summary report.
  coverage-delta:
    description: Coverage percentage point delta versus baseline-file, when provided.
  mocked-calls:
    description: Number of API calls covered by handlers.
  total-calls:
    description: Total API call count in the report.
  unmocked-count:
    description: Count of unmocked API calls.
  new-unmocked-count:
    description: Count of unmocked API calls not present in the baseline report.
  stale-count:
    description: Count of stale handlers.
  new-stale-count:
    description: Count of stale handlers not present in the baseline report.
  covered-handlers:
    description: Number of handlers matched by at least one API call.
  total-handlers:
    description: Total handler count in the report.
  uncovered-count:
    description: Count of unmocked API calls.
  comment-url:
    description: URL of the created or updated sticky comment, when enabled.
runs:
  using: node20
  main: dist/github-action/index.js
branding:
  icon: shield
  color: blue
